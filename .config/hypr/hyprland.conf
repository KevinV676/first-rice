# #######################################################################################
# HYPRLAND CONFIG - RICEADO
# #######################################################################################

################
### MONITORS ###
################
monitor=eDP-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$fileManager = dolphin
$menu = rofi -show drun
$lock = hyprlock
$browser = firefox

#################
### AUTOSTART ###
#################
exec-once = hypridle
exec-once = waybar
exec-once = swww-daemon
exec-once = waypaper --restore
exec-once = swaync
exec-once = hyprlock
exec-once = nm-applet --indicator

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ADW_DISABLE_PORTAL,1
env = GTK_THEME,Catppuccin-mocha-yellow-standard+default

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(FF8C42ff) rgba(FFD580ff) 45deg
    col.inactive_border = rgba(4A2800aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 2
    active_opacity = 0.92
    inactive_opacity = 0.80

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(200,80,10,0.4)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.2
        new_optimizations = true
	noise = 0.02
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,  default
    animation = border,        1, 5,   easeOutQuint
    animation = windows,       1, 6,   easeOutQuint, slide
    animation = windowsIn,     1, 5,   easeOutQuint, slide
    animation = windowsOut,    1, 4,   easeOutQuint, slide
    animation = fadeIn,        1, 3,   almostLinear
    animation = fadeOut,       1, 3,   almostLinear
    animation = fade,          1, 3,   quick
    animation = layers,        1, 4,   easeOutQuint
    animation = layersIn,      1, 4,   easeOutQuint, fade
    animation = layersOut,     1, 2,   linear,       fade
    animation = fadeLayersIn,  1, 2,   almostLinear
    animation = fadeLayersOut, 1, 2,   almostLinear
    animation = workspaces,    1, 5,   easeOutQuint, slidevert
    animation = workspacesIn,  1, 5,   easeOutQuint, slidevert
    animation = workspacesOut, 1, 5,   easeOutQuint, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 50
    repeat_delay = 250
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

#Bloqueo
bind = $mainMod SHIFT, B, exec, hyprlock


# Programas
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, T, togglespecialworkspace, btop
bind = $mainMod, B, exec, $browser
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -t close
bind = $mainMod, W , exec, /home/rya/.local/bin/wallpaper-picker
bind = , Print, exec, /home/rya/.local/bin/screenshot

# Tiling
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen

# Foco con flechas
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Mover ventanas con SHIFT + flechas
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Cambiar de workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll entre workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mover y redimensionar con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volumen y brillo
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fastfetch-float
    match:class = fastfetch
    float = yes
    center = yes
    size = 600 400
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Btop scratchpad flotante centrado
windowrule {
    name = btop-scratchpad
    match:workspace = special:btop
    float = yes
    size = 1200 700
    center = yes
}
