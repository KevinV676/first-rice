source = $HOME/.cache/wal/colors-hyprland.conf

background {
    monitor =
    path = /home/rya/wallpapers/wallpaper1.png
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Horas
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $color6
    font_size = 112
    font_family = MesloLGS NF
    shadow_passes = 5
    shadow_size = 6
    shadow_color = rgba(0a0500cc)
    shadow_boost = 1.5
    position = -270, 100
    halign = center
    valign = center
}

# Separador 1
label {
    monitor =
    text = <b>:</b>
    color = $color7
    font_size = 100
    font_family = MesloLGS NF
    shadow_passes = 5
    shadow_size = 6
    shadow_color = rgba(0a0500cc)
    shadow_boost = 1.5
    position = -100, 108
    halign = center
    valign = center
}

# Minutos
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $color6
    font_size = 112
    font_family = MesloLGS NF
    shadow_passes = 5
    shadow_size = 6
    shadow_color = rgba(0a0500cc)
    shadow_boost = 1.5
    position = 70, 100
    halign = center
    valign = center
}

# Separador 2
label {
    monitor =
    text = <b>:</b>
    color = $color7
    font_size = 100
    font_family = MesloLGS NF
    shadow_passes = 5
    shadow_size = 6
    shadow_color = rgba(0a0500cc)
    shadow_boost = 1.5
    position = 240, 108
    halign = center
    valign = center
}

# Segundos
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%S") </big></b>"
    color = $color6
    font_size = 112
    font_family = MesloLGS NF
    shadow_passes = 5
    shadow_size = 6
    shadow_color = rgba(0a0500cc)
    shadow_boost = 1.5
    position = 410, 100
    halign = center
    valign = center
}

# Día
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $color7
    font_size = 22
    font_family = MesloLGS NF
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(0a0500cc)
    position = 0, -10
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $color7
    font_size = 18
    font_family = MesloLGS NF
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(0a0500cc)
    position = 0, -40
    halign = center
    valign = center
}

# Temperatura
label {
    monitor =
    text = cmd[update:18000000] echo "<b>Feels like<big> $(curl -s 'wttr.in?format=%t' | tr -d '+') </big></b>"
    color = $color7
    font_size = 18
    font_family = MesloLGS NF
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(0a0500cc)
    position = 0, 40
    halign = center
    valign = bottom
}

# Campo de contraseña
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1
    rounding = 22
    outer_color = $color3
    inner_color = $color0
    font_color = $color6
    check_color = $color2
    fail_color = $color1
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    position = 0, 120
    halign = center
    valign = bottom
}
